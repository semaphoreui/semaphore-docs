name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check for orphan pages
        run: node scripts/check-orphans.js
      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "docs/**/*.md"
      - name: Build site (catches broken links)
        run: npm run build
